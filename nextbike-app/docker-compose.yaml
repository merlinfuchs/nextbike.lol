services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nextbike}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nextbike}
      POSTGRES_DB: ${POSTGRES_DB:-nextbike}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
